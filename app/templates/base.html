<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}FitLetter{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f7f4; --surface: #fff; --surface-muted: #f2f1ed;
      --ink: #26251e; --body: #5a5852; --muted: #807d72;
      --hairline: #e6e5e0; --hairline-soft: #efeee8; --sidebar-active: #ecebe6;
      --accent: #f54e00; --success: #1f8a65; --success-bg: #e6f4ea; --success-ink: #065f46;
      --warning: #c08532; --warning-bg: #faf3e8; --danger: #b42318; --danger-bg: #fef2f2;
      --shadow-card: 0 0 0 1px rgba(38, 37, 30, 0.06);
      --radius-sm: 6px; --radius-lg: 12px; --font: "Inter", ui-sans-serif, system-ui, sans-serif;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: var(--font); font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg); }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); flex-shrink: 0; padding: 20px 12px; border-right: 1px solid var(--hairline); background: var(--bg); position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 20px; font-size: 15px; font-weight: 500; }
    .brand-mark { width: 22px; height: 22px; border-radius: 6px; background: var(--ink); color: var(--bg); display: grid; place-items: center; font-size: 11px; font-weight: 600; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav a, .nav button.linkish { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); color: var(--body); text-decoration: none; font-size: 13px; border: none; background: none; width: 100%; text-align: left; cursor: pointer; font-family: inherit; }
    .nav a:hover, .nav button.linkish:hover { background: var(--hairline-soft); color: var(--ink); }
    .nav a.active { background: var(--sidebar-active); color: var(--ink); font-weight: 500; }
    .nav-sep { margin: 8px 10px; border-top: 1px solid var(--hairline); }
    .nav form.logout-form { margin-top: 2px; }
    .sidebar-foot { margin-top: auto; padding: 12px 10px 0; font-size: 12px; color: var(--muted); }
    .main { flex: 1; min-width: 0; padding: 28px 32px 48px; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { margin: 0; font-size: 22px; font-weight: 600; }
    .page-header p { margin: 6px 0 0; font-size: 13px; color: var(--muted); }
    .card { background: var(--surface); border: 1px solid var(--hairline); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; margin-bottom: 16px; }
    .card-head { padding: 16px 18px; border-bottom: 1px solid var(--hairline-soft); font-weight: 600; }
    .card-body { padding: 18px; }
    .btn { display: inline-block; background: var(--ink); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; text-decoration: none; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface-muted); color: var(--ink); border: 1px solid var(--hairline); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(180,35,24,0.2); }
    .btn-success { background: var(--success-bg); color: var(--success-ink); border: 1px solid rgba(31,138,101,0.2); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; max-width: 400px; padding: 8px 10px; border: 1px solid var(--hairline); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; }
    .alert { padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 13px; }
    .alert-error { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(180,35,24,0.15); }
    .alert-ok { background: var(--success-bg); color: var(--success-ink); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 18px; font-size: 11px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--hairline-soft); }
    td { padding: 12px 18px; border-bottom: 1px solid var(--hairline-soft); vertical-align: top; color: var(--body); }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs a { padding: 8px 12px; border-radius: var(--radius-sm); text-decoration: none; color: var(--body); font-size: 13px; }
    .tabs a.active { background: var(--sidebar-active); color: var(--ink); font-weight: 500; }
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--hairline); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-card); }
    .filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 16px; }
    .filters .field { margin: 0; }
    .filters select { max-width: 180px; }
    @media (max-width: 960px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--hairline); }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
