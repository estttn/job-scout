{% extends "base.html" %}
{% block extra_css %}
<style>
  html, body { height: 100%; overflow: hidden; }
  .auth-split {
    height: 100vh;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 70% 30%;
  }
  .auth-visual {
    position: relative;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }
  .auth-visual img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .auth-visual::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.15) 100%);
    pointer-events: none;
  }
  .auth-panel {
    height: 100vh;
    overflow-y: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    background: var(--surface);
    border-left: 1px solid var(--hairline);
  }
  .auth-form {
    width: 100%;
    max-width: 320px;
  }
  .auth-form .brand {
    padding: 0 0 8px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .auth-form .brand-mark {
    width: 28px;
    height: 28px;
    font-size: 12px;
    border-radius: 8px;
  }
  .auth-form h2 {
    margin: 0 0 6px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .auth-form .auth-lead {
    margin: 0 0 28px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .auth-form .alert { margin-bottom: 20px; }
  .auth-field {
    margin-bottom: 18px;
  }
  .auth-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--body);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .auth-field input {
    width: 100%;
    max-width: none;
    padding: 11px 12px;
    font-size: 14px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .auth-field input::placeholder { color: #a8a59c; }
  .auth-field input:hover { border-color: #d8d6ce; }
  .auth-field input:focus {
    outline: none;
    border-color: var(--ink);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(38, 37, 30, 0.08);
  }
  .auth-submit {
    width: 100%;
    margin-top: 8px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: var(--ink);
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.01em;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .auth-submit:hover { opacity: 0.92; }
  .auth-submit:active { transform: scale(0.99); }
  .auth-footer {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--hairline-soft);
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  .auth-footer a {
    color: var(--ink);
    font-weight: 500;
    text-decoration: none;
  }
  .auth-footer a:hover { color: var(--accent); }
  @media (max-width: 960px) {
    html, body { overflow: auto; }
    .auth-split {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }
    .auth-visual { height: 42vh; min-height: 220px; }
    .auth-panel {
      height: auto;
      min-height: 58vh;
      border-left: none;
      border-top: 1px solid var(--hairline);
    }
  }
</style>
{% endblock %}
{% block body %}
<div class="auth-split">
  <aside class="auth-visual" aria-hidden="true">
    <img src="/static/img/fitletter-login-hero.png" alt="" />
  </aside>
  <div class="auth-panel">
    <div class="auth-form">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
